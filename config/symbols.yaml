# Canonical v1 symbol universe for CommodityDashboard.
# Single source of truth — nothing here may be hardcoded in code.
#
# Each commodity entry:
#   future   - the futures root symbol we track for price/positioning
#   name     - human-readable label
#   iv_proxy - optionable ETF whose option chain supplies IV (Phase 3).
#              null where no liquid optionable proxy exists; IV stays
#              unavailable for that underlying until a source is found.

commodities:
  precious_metals:
    - { future: GC, name: Gold,      iv_proxy: GLD }
    - { future: SI, name: Silver,    iv_proxy: SLV }
    - { future: PL, name: Platinum,  iv_proxy: PPLT }
    - { future: PA, name: Palladium, iv_proxy: PALL }

  base_metals:
    - { future: HG,  name: Copper,   iv_proxy: CPER }
    - { future: ALI, name: Aluminum, iv_proxy: null }
    - { future: ZNC, name: Zinc,     iv_proxy: null }
    - { future: NICKEL, name: Nickel, iv_proxy: null }

  energy:
    - { future: CL, name: WTI Crude,    iv_proxy: USO }
    - { future: BZ, name: Brent Crude,  iv_proxy: BNO }
    - { future: NG, name: Natural Gas,  iv_proxy: UNG }
    - { future: RB, name: RBOB Gasoline, iv_proxy: UGA }
    - { future: HO, name: Heating Oil,  iv_proxy: null }

  grains_oilseeds:
    - { future: ZC, name: Corn,            iv_proxy: CORN }
    - { future: ZS, name: Soybeans,        iv_proxy: SOYB }
    - { future: ZM, name: Soybean Meal,    iv_proxy: null }
    - { future: ZL, name: Soybean Oil,     iv_proxy: null }
    - { future: ZW, name: Wheat (Chicago), iv_proxy: WEAT }
    - { future: KE, name: Wheat (KC HRW),  iv_proxy: null }
    - { future: MW, name: Wheat (Spring),  iv_proxy: null }
    - { future: ZR, name: Rough Rice,      iv_proxy: null }
    - { future: ZO, name: Oats,            iv_proxy: null }

  softs:
    - { future: KC,  name: Coffee, iv_proxy: null }
    - { future: SB,  name: Sugar,  iv_proxy: CANE }
    - { future: CC,  name: Cocoa,  iv_proxy: null }
    - { future: CT,  name: Cotton, iv_proxy: null }
    - { future: OJ,  name: Orange Juice, iv_proxy: null }
    - { future: LBR, name: Lumber, iv_proxy: null }

  livestock:
    - { future: LE, name: Live Cattle,   iv_proxy: null }
    - { future: GF, name: Feeder Cattle, iv_proxy: null }
    - { future: HE, name: Lean Hogs,     iv_proxy: null }

# Macro-context tickers — context only, NOT commodities (README §4 sub-panel).
macro_context:
  - { symbol: TLT, name: 20+ Year Treasury Bond ETF }
  - { symbol: VTI, name: Total US Stock Market ETF }
  - { symbol: QQQ, name: Nasdaq-100 ETF }

# Published volatility indices (Panel D). yfinance tickers.
#
# The vol-indices ETL (etl/sources/vol_indices.py) ingests `ingest: true`
# entries into iv_metrics — `ticker` is the yfinance symbol (caret), `symbol`
# is the caret-stripped name stored in iv_metrics.symbol.
#
# ^VIX is deliberately NOT ingested here (`ingest: false`): VIX is sourced from
# FRED `VIXCLS` → macro_metrics (#3). Re-pulling it via yfinance would duplicate
# it with worse lineage; the dashboard reads VIX from macro_metrics. GVZ/OVX have
# no FRED equivalent, so they belong here next to per-underlying IV.
volatility_indices:
  defaults:
    # First run backfills this many calendar days of daily closes (~3 years),
    # consistent with the FRED/EIA/CFTC backfill-default convention — never a
    # magic number in code. Later runs are incremental from max(snapshot_date).
    backfill_days: 1095
  indices:
    - { ticker: "^VIX", symbol: VIX, name: CBOE Volatility Index, ingest: false }
    - { ticker: "^GVZ", symbol: GVZ, name: CBOE Gold Volatility Index, ingest: true }
    - { ticker: "^OVX", symbol: OVX, name: CBOE Crude Oil Volatility Index, ingest: true }

# Futures term-structure / curve shape (Panel C — contango vs backwardation).
#
# The curve-shape ETL (etl/sources/curve_shape.py) takes a daily front-vs-ONE-
# deferred-contract basis snapshot per underlying → curve_shape, keyed by our
# `symbol` (e.g. CL), NOT the yfinance ticker. v1 is front vs one deferred leg
# only — not a full multi-point curve.
#
# Per underlying:
#   symbol        - our future root, stored in curve_shape.symbol (NOT yfinance).
#   front_ticker  - yfinance continuous front-month ticker (e.g. CL=F).
#   suffix        - exchange suffix for the explicit month-coded deferred ticker
#                   (.NYM CME/NYMEX energy, .CBT CBOT, .CMX COMEX). yfinance
#                   month-coded symbology is <ROOT><MONTHCODE><YY><SUFFIX>, e.g.
#                   CLN26.NYM (month codes F G H J K M N Q U V X Z = Jan..Dec).
#   deferred_root - root for the month-coded deferred ticker (often == front_ticker
#                   minus "=F", but kept explicit because symbology is fragile).
#   months_out    - deferred contract is this many delivery months past the
#                   active front contract's delivery month; the annualized slope
#                   divides by months_out/12. Both the deferred ticker and the
#                   slope denominator are anchored to the front contract's
#                   *realized* delivery month (front_lead_months + roll_day
#                   below), NOT the calendar month — so near a roll they stay
#                   correctly scaled (#12). Energy contracts list every
#                   consecutive month, so front_delivery_month + months_out is a
#                   valid listed contract. Underlyings whose listing months are
#                   NOT consecutive (grains/softs) would need a next-listed-month
#                   resolver and are intentionally out of scope (see below).
#   front_lead_months - how many months ahead of the calendar month the active
#                   front contract's *delivery* month normally sits. Energy
#                   front-months deliver the next calendar month, so 1. (A
#                   contract delivering month M lists/trades through ~M-1.)
#   roll_day      - day-of-month (in the snapshot date) at/after which the front
#                   contract has expired and the active front has rolled forward
#                   one further delivery month. Approximates the exchange's
#                   last-trade date (e.g. WTI ~3 business days before the 25th of
#                   the month prior to delivery → ~the 20th-22nd). A fixed
#                   calendar day, not the exact exchange business-day rule: it is
#                   deterministic and host-timezone independent (it reads only the
#                   passed snapshot date). The residual ~1-2 day imprecision only
#                   shifts the anchor by one month right at the roll boundary and
#                   still degrades to an honest NULL leg if the resolved ticker is
#                   illiquid — it never fabricates a price.
#
# MUST-HAVE: the five energy underlyings with a real free front-month future
# (CL, BZ, NG, RB, HO). Anything not listed here is intentionally out of scope:
# base metals (ALI/ZNC/NICKEL, LME) have no free curve — flagged-not-faked, same
# boundary as IV; grains/softs term structure is dominated by old-crop/new-crop
# seasonality and is deferred (would falsely scream a regime).
curve:
  defaults:
    # Annualized-slope deadband (decimal, i.e. 0.005 = 0.5% annualized carry):
    # |slope_pct| inside [-eps, +eps] is reported 'flat' rather than flip-flopping
    # contango/backwardation day to day on noise. Non-zero by design.
    flat_eps: 0.005
  underlyings:
    - { symbol: CL, front_ticker: "CL=F", deferred_root: CL, suffix: ".NYM", months_out: 6, front_lead_months: 1, roll_day: 20 }
    - { symbol: BZ, front_ticker: "BZ=F", deferred_root: BZ, suffix: ".NYM", months_out: 6, front_lead_months: 2, roll_day: 28 }
    - { symbol: NG, front_ticker: "NG=F", deferred_root: NG, suffix: ".NYM", months_out: 6, front_lead_months: 1, roll_day: 26 }
    - { symbol: RB, front_ticker: "RB=F", deferred_root: RB, suffix: ".NYM", months_out: 6, front_lead_months: 1, roll_day: 28 }
    - { symbol: HO, front_ticker: "HO=F", deferred_root: HO, suffix: ".NYM", months_out: 6, front_lead_months: 1, roll_day: 28 }
